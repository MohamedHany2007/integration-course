<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة حساب التكامل | د. صلاح الدين عباس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-950">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MathText = ({ text, className }) => {
            const containerRef = useRef(null);

            useEffect(() => {
                let isCancelled = false;
                const renderMath = () => {
                    if (isCancelled) return;
                    if (containerRef.current && window.MathJax && window.MathJax.typesetPromise) {
                        window.MathJax.typesetClear([containerRef.current]);
                        window.MathJax.typesetPromise([containerRef.current]).catch((err) => console.error(err));
                    } else {
                        setTimeout(renderMath, 100);
                    }
                };
                renderMath();
                return () => { isCancelled = true; };
            }, [text]);

            return (
                <span ref={containerRef} className={className} dangerouslySetInnerHTML={{ __html: text }} />
            );
        };

        const THEORY_DATA = [
            { id: 't1', type: 'مفهوم أساسي', title: 'تعريف التكامل المحدود', content: '<p class="mb-2">إذا كانت الدالة <strong class="text-emerald-400">$f(x)$</strong> متصلة على الفترة <strong class="text-cyan-400">$[a, b]$</strong>، فإن التكامل المحدود يمثل المساحة الجبرية المحصورة بين منحنى الدالة ومحور السينات.</p> <p>$$ \\int_{a}^{b} f(x) dx = F(b) - F(a) $$</p>' },
            { id: 't2', type: 'نظرية هامة', title: 'العلاقة بين الدوال الزائدية والأسية', content: '<ul class="list-disc list-inside space-y-2 mt-4 text-slate-300"> <li>دالة الجيب الزائدي: $$ \\sinh(x) = \\frac{e^x - e^{-x}}{2} $$</li> <li>دالة جيب التمام الزائدي: $$ \\cosh(x) = \\frac{e^x + e^{-x}}{2} $$</li> </ul>', derivation: '<p>بتربيع كل من المعادلتين وطرحهما نجد أن: $\\cosh^2(x) - \\sinh^2(x) = 1$</p>' }
        ];

        const QUESTION_BANK_DATA = [
            { id: 1, type: 'تمرين', category: 'دوال أسية', source: 'تمارين - صفحة 21', ruleRef: 'التعويض الجبري', problem: '$$ \\int \\frac{e^{\\sqrt{x}}}{\\sqrt{x}} dx $$', steps: ['نفرض أن $u = \\sqrt{x}$.', 'نفاضل الطرفين: $du = \\frac{1}{2\\sqrt{x}} dx$', 'النتيجة: $$ 2e^{\\sqrt{x}} + c $$'] },
            { id: 2, type: 'تمرين', category: 'دوال لوغاريتمية', source: 'تمارين - صفحة 21', ruleRef: 'البسط مشتقة المقام', problem: '$$ \\int \\frac{dx}{x - x \\ln x} $$', steps: ['نأخذ $x$ عامل مشترك.', 'نفرض $u = 1 - \\ln x$.', 'النتيجة: $$ -\\ln|1 - \\ln x| + c $$'] }
        ];

        const RULES_DATA = [
            { id: 1, category: 'أساسية', func: '$y = x^n$', deriv: '$\\frac{dy}{dx} = n x^{n-1}$' },
            { id: 3, category: 'أساسية', func: '$y = e^x$', deriv: '$\\frac{dy}{dx} = e^x$' },
            { id: 5, category: 'مثلثية', func: '$y = \\sin(x)$', deriv: '$\\frac{dy}{dx} = \\cos(x)$' }
        ];

        function TheoryHub() {
            return (
                <div className="space-y-8 animate-fade-in">
                    <h2 className="text-3xl font-bold text-white mb-2">موسوعة النظريات والتعاريف</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {THEORY_DATA.map(item => (
                            <div key={item.id} className="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                                <span className="text-cyan-400 text-xs bg-slate-700 px-2 py-1 rounded mb-2 inline-block">{item.type}</span>
                                <h3 className="font-bold text-xl text-white mb-4">{item.title}</h3>
                                <MathText text={item.content} className="text-slate-300" />
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function QuestionBank() {
            return (
                <div className="space-y-8 animate-fade-in">
                    <h2 className="text-3xl font-bold text-white mb-2">بنك الأسئلة التفاعلي</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {QUESTION_BANK_DATA.map(q => (
                            <div key={q.id} className="bg-slate-900 border border-amber-900/50 p-6 rounded-2xl shadow-xl text-center">
                                <span className="text-amber-400 text-xs bg-amber-900/50 px-2 py-1 rounded mb-2 inline-block">{q.source}</span>
                                <MathText text={q.problem} className="text-2xl text-white block my-4" />
                                <div className="text-left bg-slate-950 p-4 rounded-xl mt-4 border border-slate-800">
                                    <h4 className="text-emerald-400 mb-2 font-bold">الحل:</h4>
                                    {q.steps.map((step, i) => <MathText key={i} text={step} className="block text-slate-300 mb-2" />)}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function InteractiveLab() {
            const [cValue, setCValue] = useState(0);
            return (
                <div className="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-xl animate-fade-in text-center">
                    <h2 className="text-2xl font-bold text-white mb-4">تأثير ثابت التكامل (C)</h2>
                    <MathText text={`$y = x^2 ${cValue >= 0 ? '+' : ''} ${cValue}$`} className="text-3xl text-cyan-400 font-bold block mb-8" />
                    <input type="range" min="-10" max="10" step="1" value={cValue} onChange={(e) => setCValue(e.target.value)} className="w-full max-w-md cursor-pointer accent-cyan-400" />
                </div>
            );
        }

        function App() {
            const [activeTab, setActiveTab] = useState('theory');
            const tabs = [
                { id: 'theory', label: 'المستودع المعرفي', icon: '📖' },
                { id: 'bank', label: 'بنك الأسئلة', icon: '🧠' },
                { id: 'lab', label: 'المعمل التفاعلي', icon: '🔬' }
            ];

            return (
                <div className="min-h-screen bg-slate-950 text-slate-200" dir="rtl">
                    <header className="bg-slate-900 border-b border-slate-800 sticky top-0 z-50 p-4">
                        <div className="max-w-6xl mx-auto">
                            <h1 className="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-l from-emerald-400 to-cyan-400 mb-4">حسبان (2): حساب التكامل</h1>
                            <div className="flex gap-2 overflow-x-auto">
                                {tabs.map(tab => (
                                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-4 py-2 rounded-lg font-bold transition-colors ${activeTab === tab.id ? 'bg-cyan-900 text-cyan-400' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>
                                        {tab.icon} {tab.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>
                    <main className="max-w-6xl mx-auto p-6">
                        {activeTab === 'theory' && <TheoryHub />}
                        {activeTab === 'bank' && <QuestionBank />}
                        {activeTab === 'lab' && <InteractiveLab />}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
